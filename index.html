<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#2b2024,#4b353b,#2b2024);
  overflow:hidden;
  color:white;
}

/* 🔥 باقي الكود نفسه بدون تغيير */
.container{
  width:90%;
  max-width:430px;
  text-align:center;
}

.card{
  background:rgba(255,255,255,.08);
  padding:18px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(255,105,180,.35);
}

.card img{
  width:100%;
  height:360px;
  object-fit:cover;
  border-radius:20px;
}

.text-box{
  margin:22px auto 15px;
  background:#07050a;
  color:white;
  padding:14px 20px;
  border-radius:16px;
  border:2px solid #ff9fbd;
  box-shadow:0 0 15px #ff6fa3;
  font-size:20px;
  font-weight:bold;
}

.btn{
  border:none;
  padding:14px 38px;
  border-radius:35px;
  background:linear-gradient(135deg,#ff8bb5,#ff4f8b);
  color:white;
  font-size:19px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #ff5c93;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 35px #ff4f8b, 0 0 60px #ff5c93;
}

.btn:active{
  transform:scale(0.95);
}

.music-box{
  display:none;
  background:rgba(255,255,255,.08);
  padding:30px 20px;
  border-radius:25px;
  border:2px solid #ff8bb5;
  box-shadow:0 0 25px #ff5c93;
}

.music-box img{
  width:170px;
  height:170px;
  object-fit:cover;
  border-radius:20px;
  margin:20px 0;
  box-shadow:0 0 25px #ff5c93;
}

.music-title{
  font-size:24px;
  font-weight:bold;
  margin-bottom:15px;
}

.progress{
  width:85%;
  height:8px;
  background:#eee;
  border-radius:20px;
  margin:15px auto;
  overflow:hidden;
}

#bar{
  display:block;
  height:100%;
  width:0%;
  background:#ff5c93;
}

.time{
  display:flex;
  justify-content:space-between;
  width:85%;
  margin:auto;
  font-size:14px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:25px 0;
}

.control{
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:#ff5c93;
  color:white;
  font-size:24px;
  box-shadow:0 0 20px #ff5c93;
  cursor:pointer;
  transition:0.3s;
}

.control:hover{
  transform:scale(1.2);
  box-shadow:0 0 35px #ff5c93;
}

.control:active{
  transform:scale(0.9);
}

.heart{
  position:fixed;
  color:#ff5c93;
  font-size:35px;
  animation:float 6s linear infinite;
  opacity:.35;
}

@keyframes float{
  from{transform:translateY(100vh); opacity:0;}
  30%{opacity:.5;}
  to{transform:translateY(-120px); opacity:0;}
}
</style>
</head>

<body>

<audio id="music">
  <source src="song.mp4" type="audio/mp4">
</audio>

<div class="heart" style="left:10%; animation-delay:0s;">❤</div>
<div class="heart" style="left:30%; animation-delay:1s;">❤</div>
<div class="heart" style="left:55%; animation-delay:2s;">❤</div>
<div class="heart" style="left:80%; animation-delay:3s;">❤</div>

<div class="container">

  <div class="card" id="mainCard">
    <img id="photo" src="1.jpg">

    <div class="text-box" id="text">
     هلو ميريتي
    </div>

    <button class="btn" onclick="nextSlide()" id="buttonText">
      هاااا
    </button>
  </div>

  <div class="music-box" id="musicBox">
    <div class="music-title">🎵 بوسة ماكو لشفتييي </div>

    <img src="6.jpg">

    <div class="progress">
      <span id="bar"></span>
    </div>

    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="control" onclick="rewind()">⏮</button>
      <button class="control" onclick="togglePlay()" id="playBtn">▶</button>
      <button class="control" onclick="forward()">⏭</button>
    </div>

    <button class="btn" onclick="restart()">♡ استودعتج الله </button>
  </div>

</div>

<script>
let index = 0;

let slides = [
  {img:"1.jpg", text:"هلو بيب", btn:"هلوو"},
  {img:"2.jpg", text:"حيوانة عندي سؤال الج ثولة", btn:"ها زمال؟"},
  {img:"3.jpg", text:"بس مستحي اسألج اياه ", btn:"اي دكوللل"},
  {img:"4.jpg", text:"تحبين عبود لو لا؟", btn:"ها "},
  {img:"5.jpg", text:" ها سفن شنو حيوانة تحبيني", btn:" لا"},
  {img:"6.jpg", text:"اذا تحبين علي دوسي جوة ", btn:"انجب"},
  {img:"7.jpg", text:"ها حيوانة طلعتي تحبيني تفففف", btn:"اتفييييي"}
];

let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let bar = document.getElementById("bar");
let current = document.getElementById("current");
let duration = document.getElementById("duration");

function nextSlide(){
  index++;
  if(index < slides.length){
    photo.src = slides[index].img;
    text.innerHTML = slides[index].text;
    buttonText.innerHTML = slides[index].btn;
  }else{
    mainCard.style.display = "none";
    musicBox.style.display = "block";
  }
}

function togglePlay(){
  if(music.paused){
    music.play();
    playBtn.innerHTML = "⏸";
  }else{
    music.pause();
    playBtn.innerHTML = "▶";
  }
}

function rewind(){ music.currentTime -= 5; }
function forward(){ music.currentTime += 5; }

music.addEventListener("timeupdate", function(){
  let percent = (music.currentTime / music.duration) * 100;
  bar.style.width = percent + "%";
  current.innerHTML = formatTime(music.currentTime);
  duration.innerHTML = formatTime(music.duration);
});

function formatTime(t){
  if(isNaN(t)) return "0:00";
  let m = Math.floor(t/60);
  let s = Math.floor(t%60);
  if(s<10) s="0"+s;
  return m+":"+s;
}

function restart(){
  index = 0;
  music.pause();
  music.currentTime = 0;
  playBtn.innerHTML = "▶";
  mainCard.style.display = "block";
  musicBox.style.display = "none";
  photo.src = slides[0].img;
  text.innerHTML = slides[0].text;
  buttonText.innerHTML = slides[0].btn;
}
</script>

</body>
</html>
